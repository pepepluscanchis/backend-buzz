services:
  db:
    image: postgis/postgis:15-3.3
    container_name: buzz-db
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: buzz_db
    ports:
      - "5433:5432"
    volumes:
      - buzz_data:/var/lib/postgresql/data

volumes:
  buzz_data: